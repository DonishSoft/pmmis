name: Deploy PMMIS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/pmmis

            echo "=== Backing up uploads from running container ==="
            mkdir -p /tmp/pmmis-uploads-backup
            docker cp pmmis-web:/app/wwwroot/uploads /tmp/pmmis-uploads-backup/ 2>/dev/null || echo "No running container or no uploads to backup"

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Cleaning Docker build cache ==="
            docker builder prune -af

            echo "=== Building PMMIS web container ==="
            docker compose build --no-cache pmmis-web

            echo "=== Restarting PMMIS web container ==="
            docker compose up -d pmmis-web

            echo "=== Restoring uploads if volume was empty ==="
            if [ -d "/tmp/pmmis-uploads-backup/uploads" ]; then
              docker cp /tmp/pmmis-uploads-backup/uploads/. pmmis-web:/app/wwwroot/uploads/ 2>/dev/null || true
              rm -rf /tmp/pmmis-uploads-backup
            fi

            echo "=== Cleanup old images ==="
            docker image prune -f

            echo "=== Deployment complete ==="
            docker ps --filter name=pmmis --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
